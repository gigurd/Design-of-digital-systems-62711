name: Build Report PDF

on:
  push:
    branches: [main]
    paths:
      - 'Report/**'
      - '.github/workflows/build-report.yml'
  repository_dispatch:
    types: [report-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update submodule to latest
        if: github.event_name == 'repository_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git submodule update --remote Report
          git add Report
          git diff --cached --quiet || git commit -m "Update report submodule to latest"
          git push

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Report

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Group03_PWA_Report
          path: Report/main.pdf

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Report
          files: Report/main.pdf
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
